<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 20px}
.nav{display:flex;gap:10px;margin-bottom:24px}
.nav a{padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #334155;color:#94a3b8;background:#1e293b}
.nav a.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.header{text-align:center;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:12px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.s-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 18px;text-align:center}
.s-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.s-val{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600}
.s-val.green{color:var(--green)}.s-val.red{color:var(--red)}
.filter-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.filter-btn{padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.filter-btn:hover{border-color:var(--cyan)}
.filter-btn.active{background:var(--cyan);color:#fff;border-color:var(--cyan)}
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;background:rgba(30,41,59,.5);border-bottom:1px solid var(--border);white-space:nowrap}
th.r{text-align:right}
td{padding:9px 14px;font-size:12px;border-bottom:1px solid rgba(30,41,59,.3);white-space:nowrap}
tr:hover td{background:var(--card2)}
td.mono{font-family:'JetBrains Mono',monospace;font-size:12px}
td.r{text-align:right}
.in-tag{color:var(--green);font-size:10px;background:rgba(16,185,129,.1);padding:2px 8px;border-radius:4px}
.out-tag{color:var(--red);font-size:10px;background:rgba(239,68,68,.1);padding:2px 8px;border-radius:4px}
.acct-tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--cyan)}
@media(max-width:768px){.summary{grid-template-columns:1fr}.filter-bar{overflow-x:auto}}
</style>
</head>

var filter="all";
function fmt(n){return Math.abs(Math.round(n)).toLocaleString("ko-KR")}
function fs(n){return(n>0?"+":"-")+fmt(n)}
function renderSummary(data){
  var totalIn=0,totalOut=0;
  for(var i=0;i<data.length;i++){if(data[i].v>0)totalIn+=data[i].v;else totalOut+=data[i].v;}
  var net=totalIn+totalOut;
  document.getElementById("summary").innerHTML=
    "<div class='s-box'><div class='s-label'>총 입금</div><div class='s-val green'>+"+fmt(totalIn)+"</div></div>"+
    "<div class='s-box'><div class='s-label'>총 출금</div><div class='s-val red'>-"+fmt(totalOut)+"</div></div>"+
    "<div class='s-box'><div class='s-label'>순 입출금</div><div class='s-val "+(net>=0?"green":"red")+"'>"+fs(net)+"</div></div>";
}
function renderFilters(){
  var accts=["134","142","161","614","637"];
  var h="<button class='filter-btn "+(filter==="all"?"active":"")+"' onclick=\"setFilter('all')\">전체 ("+D.length+")</button>";
  for(var i=0;i<accts.length;i++){
    var a=accts[i];var c=0;
    for(var j=0;j<D.length;j++){if(D[j].a===a)c++;}
    if(c>0)h+="<button class='filter-btn "+(filter===a?"active":"")+"' onclick=\"setFilter('"+a+"')\">***"+a+" ("+c+")</button>";
  }
  h+="<button class='filter-btn "+(filter==="in"?"active":"")+"' onclick=\"setFilter('in')\">입금만</button>";
  h+="<button class='filter-btn "+(filter==="out"?"active":"")+"' onclick=\"setFilter('out')\">출금만</button>";
  document.getElementById("filters").innerHTML=h;
}
function setFilter(f){filter=f;render();}
function render(){
  var data=[];
  for(var i=0;i<D.length;i++){
    var r=D[i];
    if(filter==="in"&&r.v<=0)continue;
    if(filter==="out"&&r.v>=0)continue;
    if(filter!=="all"&&filter!=="in"&&filter!=="out"&&r.a!==filter)continue;
    data.push(r);
  }
  renderSummary(data);
  renderFilters();
  var html="";
  for(var i=0;i<data.length;i++){
    var r=data[i];
    var isIn=r.v>0;
    var tag=isIn?"<span class='in-tag'>입금</span>":"<span class='out-tag'>출금</span>";
    var c=isIn?"color:#10b981":"color:#ef4444";
    html+="<tr><td class='mono'>"+r.d+"</td><td><span class='acct-tag'>***"+r.a+"</span></td><td>"+r.g+"</td><td>"+tag+"</td><td>"+r.nm+"</td><td class='mono r' style='"+c+";font-weight:500'>"+fs(r.v)+"</td></tr>";
  }
  document.getElementById("tbody").innerHTML=html;
}
