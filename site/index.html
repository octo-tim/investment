<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계좌 손익 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:900px;margin:0 auto;padding:24px 20px}.header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.header p{color:var(--muted);font-size:13px;margin-top:6px;font-family:'JetBrains Mono',monospace}.note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--blue);margin-bottom:24px;line-height:1.7}.acct-list{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}.acct-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color .2s}.acct-card:hover{border-color:var(--cyan)}.acct-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.acct-name{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);font-weight:600}.acct-badge{font-size:11px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:12px}.acct-flows{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(30,41,59,.5)}.flow-label{font-size:11px;color:var(--muted);margin-bottom:3px}.flow-value{font-family:'JetBrains Mono',monospace;font-size:13px}.flow-value.in{color:var(--green)}.flow-value.out{color:var(--red)}.flow-value.base{color:var(--text)}.input-row{display:flex;align-items:center;gap:14px}.input-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:100px}.input-wrap{flex:1;position:relative}.input-wrap span.prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}.input-wrap input{width:100%;padding:10px 14px 10px 28px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;transition:border-color .2s;text-align:right}.input-wrap input:focus{border-color:var(--cyan)}.input-wrap input::placeholder{color:var(--muted);font-size:12px}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif}.toggle-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.flow-detail{display:none;margin-top:12px;border-top:1px solid rgba(30,41,59,.4);padding-top:10px}
.flow-detail.open{display:block}
.fd-row{display:grid;grid-template-columns:90px 100px 1fr 110px;gap:8px;padding:5px 0;font-size:11px;border-bottom:1px solid rgba(30,41,59,.2);align-items:center}
.fd-row .fd-date{font-family:'JetBrains Mono',monospace;color:var(--muted)}
.fd-row .fd-type{color:var(--text2);font-size:10px}
.fd-row .fd-name{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-row .fd-amt{font-family:'JetBrains Mono',monospace;text-align:right;font-size:12px}
.results{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}.results-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.result-box{background:var(--card2);border-radius:10px;padding:16px 20px;border:1px solid var(--border)}.result-box.full{grid-column:1/-1}.result-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.result-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}.result-value.green{color:var(--green)}.result-value.red{color:var(--red)}.result-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}.acct-results{margin-top:18px}.acct-result-row{display:grid;grid-template-columns:120px 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(30,41,59,.4);font-size:12px;align-items:center}.acct-result-row.header{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}.acct-result-row .mono{font-family:'JetBrains Mono',monospace;text-align:right}.acct-result-row .acct-label{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:12px}.formula-note{margin-top:18px;padding:14px 18px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.7}.nav{display:flex;gap:10px;margin-bottom:20px}.nav a{padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #334155;color:#94a3b8;background:#1e293b}.nav a.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.acct-card,.results{animation:fadeUp .4s ease-out backwards}
</style>
</head>
