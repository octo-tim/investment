<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계좌 손익 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:900px;margin:0 auto;padding:24px 20px}.header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.header p{color:var(--muted);font-size:13px;margin-top:6px;font-family:'JetBrains Mono',monospace}.note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--blue);margin-bottom:24px;line-height:1.7}.acct-list{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}.acct-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color .2s}.acct-card:hover{border-color:var(--cyan)}.acct-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.acct-name{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);font-weight:600}.acct-badge{font-size:11px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:12px}.acct-flows{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(30,41,59,.5)}.flow-label{font-size:11px;color:var(--muted);margin-bottom:3px}.flow-value{font-family:'JetBrains Mono',monospace;font-size:13px}.flow-value.in{color:var(--green)}.flow-value.out{color:var(--red)}.input-row{display:flex;align-items:center;gap:14px}.input-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:120px}.input-wrap{flex:1;position:relative}.input-wrap span.prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}.input-wrap input{width:100%;padding:10px 14px 10px 28px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;transition:border-color .2s;text-align:right}.input-wrap input:focus{border-color:var(--cyan)}.input-wrap input::placeholder{color:var(--muted);font-size:12px}.results{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}.results-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.result-box{background:var(--card2);border-radius:10px;padding:16px 20px;border:1px solid var(--border)}.result-box.full{grid-column:1/-1}.result-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.result-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}.result-value.green{color:var(--green)}.result-value.red{color:var(--red)}.result-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}.acct-results{margin-top:18px}.acct-result-row{display:grid;grid-template-columns:140px 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(30,41,59,.4);font-size:12px;align-items:center}.acct-result-row.header{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}.acct-result-row .mono{font-family:'JetBrains Mono',monospace;text-align:right}.acct-result-row .acct-label{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:12px}.formula-note{margin-top:18px;padding:14px 18px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.7}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.acct-card,.results{animation:fadeUp .4s ease-out backwards}
</style>
</head>
<body>
<div class="container">
<div style="display:flex;gap:12px;margin-bottom:20px">
  <a href="/" style="padding:8px 18px;border-radius:8px;background:#3b82f6;color:#fff;text-decoration:none;font-size:13px;font-weight:500">📊 손익 계산기</a>
  <a href="/dashboard.html" style="padding:8px 18px;border-radius:8px;background:#1e293b;color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #334155">📋 투자분석 대시보드</a>
</div>
<div class="header">
  <h1>계좌별 잔액 기반 손익 계산기</h1>
  <p>신한투자증권 5개 계좌 · 2025.08 – 2026.04</p>
</div>
<div class="note">
  💡 각 계좌의 <strong>현재 총 평가잔액</strong>(예수금 + 주식평가액 + 펀드평가액 등)을 MTS/HTS에서 확인하여 입력해주세요.<br>
  &nbsp;&nbsp;&nbsp;손익 = 현재잔액 − 순입금액 (입금 − 출금) − 기초잔액
</div>
<div class="acct-list" id="acct-list"></div>
<div class="results" id="results" style="display:none"></div>
</div>
<script>
const accounts=[{id:'134',num:'270-84-***134',label:'대형주 (NAVER·삼성·SK하이닉스)',deposits:100000000,withdrawals:157662},{id:'142',num:'270-84-***142',label:'ETF + 개별종목',deposits:0,withdrawals:0},{id:'161',num:'270-85-***161',label:'IRP 계좌',deposits:14000000,withdrawals:0},{id:'614',num:'270-87-***614',label:'중소형주',deposits:0,withdrawals:273653488},{id:'637',num:'270-25-***637',label:'종합 (국내·해외·채권·RP)',deposits:320943102,withdrawals:2249919000}];
function fmt(n){if(n===0)return'0';const a=Math.abs(Math.round(n));const s=a.toLocaleString('ko-KR');return n<0?'-'+s:s}
function fmtSign(n){if(n===0)return'0';const a=Math.abs(Math.round(n));const s=a.toLocaleString('ko-KR');return n>0?'+'+s:'-'+s}
function render(){const list=document.getElementById('acct-list');list.innerHTML='';accounts.forEach(a=>{const net=a.deposits-a.withdrawals;const netCls=net>=0?'in':'out';list.innerHTML+=`<div class="acct-card"><div class="acct-top"><span class="acct-name">${a.num}</span><span class="acct-badge">${a.label}</span></div><div class="acct-flows"><div class="flow-item"><div class="flow-label">기간 내 입금</div><div class="flow-value in">${a.deposits>0?'+'+fmt(a.deposits):'-'}</div></div><div class="flow-item"><div class="flow-label">기간 내 출금</div><div class="flow-value out">${a.withdrawals>0?'-'+fmt(a.withdrawals):'-'}</div></div><div class="flow-item"><div class="flow-label">순입금</div><div class="flow-value ${netCls}">${fmtSign(net)}</div></div></div><div style="display:flex;gap:12px;flex-wrap:wrap"><div class="input-row" style="flex:1;min-width:200px"><label>기초잔액 (8/1)</label><div class="input-wrap"><span class="prefix">₩</span><input type="text" id="begin_${a.id}" placeholder="기간 시작 시점 잔액" oninput="formatAndCalc(this)"/></div></div><div class="input-row" style="flex:1;min-width:200px"><label>현재잔액 (오늘)</label><div class="input-wrap"><span class="prefix">₩</span><input type="text" id="current_${a.id}" placeholder="현재 총 평가잔액" oninput="formatAndCalc(this)"/></div></div></div></div>`})}
function parseNum(s){if(!s)return 0;return parseInt(s.replace(/[^0-9\-]/g,''),10)||0}
function formatAndCalc(el){const raw=el.value.replace(/[^0-9\-]/g,'');if(raw===''||raw==='-'){el.value=raw;calc();return}const n=parseInt(raw,10);if(isNaN(n)){calc();return}const cursor=el.selectionStart;const lb=el.value.length;el.value=n.toLocaleString('ko-KR');const la=el.value.length;el.setSelectionRange(cursor+(la-lb),cursor+(la-lb));calc()}
function calc(){let hasAny=false;let tB=0,tC=0,tN=0,tP=0;const rows=[];accounts.forEach(a=>{const bv=parseNum(document.getElementById(`begin_${a.id}`).value);const cv=parseNum(document.getElementById(`current_${a.id}`).value);const nf=a.deposits-a.withdrawals;if(cv!==0||bv!==0)hasAny=true;const pnl=cv-bv-nf;tB+=bv;tC+=cv;tN+=nf;tP+=pnl;rows.push({...a,beginVal:bv,currentVal:cv,netFlow:nf,pnl})});const el=document.getElementById('results');if(!hasAny){el.style.display='none';return}el.style.display='block';const pc=tP>=0?'green':'red';const pp=tB>0?(tP/tB*100):0;el.innerHTML=`<div class="results-title">📊 전체 투자 손익</div><div class="result-grid"><div class="result-box full"><div class="result-label">총 투자 손익</div><div class="result-value ${pc}">${fmtSign(tP)}원</div><div class="result-sub">${tB>0?'수익률 '+(tP>=0?'+':'')+pp.toFixed(2)+'%':''}</div></div><div class="result-box"><div class="result-label">기초 잔액 합계</div><div class="result-value" style="font-size:18px">${fmt(tB)}</div></div><div class="result-box"><div class="result-label">현재 잔액 합계</div><div class="result-value" style="font-size:18px">${fmt(tC)}</div></div><div class="result-box"><div class="result-label">순입금 합계 (입금−출금)</div><div class="result-value" style="font-size:18px;color:${tN>=0?'var(--green)':'var(--red)'}">${fmtSign(tN)}</div></div><div class="result-box"><div class="result-label">수수료 + 제세금 (참고)</div><div class="result-value" style="font-size:18px;color:var(--amber)">6,273,588</div></div></div><div class="acct-results"><div class="acct-result-row header"><div>계좌</div><div class="mono">기초잔액</div><div class="mono">순입금</div><div class="mono">현재잔액</div><div class="mono">손익</div></div>${rows.map(r=>{const c=r.pnl>=0?'color:var(--green)':'color:var(--red)';return`<div class="acct-result-row"><div class="acct-label">${r.num.slice(-6)}</div><div class="mono">${fmt(r.beginVal)}</div><div class="mono" style="color:${r.netFlow>=0?'var(--green)':'var(--red)'}">${fmtSign(r.netFlow)}</div><div class="mono">${fmt(r.currentVal)}</div><div class="mono" style="${c};font-weight:600">${fmtSign(r.pnl)}</div></div>`}).join('')}<div class="acct-result-row" style="border-top:2px solid var(--blue);font-weight:600"><div style="color:var(--text)">합계</div><div class="mono">${fmt(tB)}</div><div class="mono" style="color:${tN>=0?'var(--green)':'var(--red)'}">${fmtSign(tN)}</div><div class="mono">${fmt(tC)}</div><div class="mono" style="${tP>=0?'color:var(--green)':'color:var(--red)'}">${fmtSign(tP)}</div></div></div><div class="formula-note">📐 <strong>계산 공식:</strong> 손익 = 현재잔액 − 기초잔액 − 순입금(입금−출금)<br>&nbsp;&nbsp;&nbsp;&nbsp;기초잔액: 2025년 8월 1일 시점의 계좌 총 평가잔액<br>&nbsp;&nbsp;&nbsp;&nbsp;순입금: 거래내역에서 추출한 외부 입출금 (은행이체, 계좌대체, 전환입출금)<br>&nbsp;&nbsp;&nbsp;&nbsp;⚠️ 161(IRP) 계좌는 입금 1,400만원이 기간 내 신규 개설로 추정되어 기초잔액 0으로 두면 됩니다.</div>`}
render();
</script>
</body>
</html>
