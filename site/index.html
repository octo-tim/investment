<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계좌 손익 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 20px}
.nav{display:flex;gap:10px;margin-bottom:20px}
.nav a{padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #334155;color:#94a3b8;background:#1e293b}
.nav a.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:13px;margin-top:6px;font-family:'JetBrains Mono',monospace}
.note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--blue);margin-bottom:24px;line-height:1.7}

/* Date picker area */
.date-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px;flex-wrap:wrap}
.date-bar label{font-size:13px;color:var(--text2);white-space:nowrap}
.date-bar input[type=date]{padding:8px 12px;background:var(--card2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:14px;outline:none}
.date-bar input[type=date]:focus{border-color:var(--cyan)}
.date-bar input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.save-btn{padding:8px 20px;border-radius:6px;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .2s}
.save-btn.primary{background:var(--blue);color:#fff}
.save-btn.primary:hover{background:#2563eb}
.save-btn.danger{background:transparent;border:1px solid var(--red);color:var(--red);margin-left:auto}
.save-btn.danger:hover{background:rgba(239,68,68,.1)}
.save-msg{font-size:12px;color:var(--green);opacity:0;transition:opacity .3s}
.save-msg.show{opacity:1}

/* History panel */
.history-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:24px;overflow:hidden}
.history-toggle{width:100%;padding:12px 18px;background:none;border:none;color:var(--cyan);font-size:13px;font-weight:500;cursor:pointer;text-align:left;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:8px}
.history-toggle:hover{background:var(--card2)}
.history-body{display:none;padding:0 18px 14px}
.history-body.open{display:block}
.h-table{width:100%;border-collapse:collapse}
.h-table th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border)}
.h-table th.r{text-align:right}
.h-table td{padding:7px 10px;font-size:11px;border-bottom:1px solid rgba(30,41,59,.3);font-family:'JetBrains Mono',monospace}
.h-table td.r{text-align:right}
.h-table tr:hover td{background:var(--card2)}
.h-table tr.clickable{cursor:pointer}
.h-table .del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;padding:2px 6px;border-radius:4px}
.h-table .del-btn:hover{background:rgba(239,68,68,.15)}
.h-empty{padding:16px;text-align:center;color:var(--muted);font-size:12px}

.acct-list{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}
.acct-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color .2s}
.acct-card:hover{border-color:var(--cyan)}
.acct-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.acct-name{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);font-weight:600}
.acct-badge{font-size:11px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:12px}
.acct-flows{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(30,41,59,.5)}
.flow-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.flow-value{font-family:'JetBrains Mono',monospace;font-size:13px}
.flow-value.in{color:var(--green)}.flow-value.out{color:var(--red)}.flow-value.base{color:var(--text)}
.input-row{display:flex;align-items:center;gap:14px}
.input-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:100px}
.input-wrap{flex:1;position:relative}
.input-wrap span.prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.input-wrap input{width:100%;padding:10px 14px 10px 28px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;transition:border-color .2s;text-align:right}
.input-wrap input:focus{border-color:var(--cyan)}
.input-wrap input::placeholder{color:var(--muted);font-size:12px}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif}
.toggle-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.flow-detail{display:none;margin-top:12px;border-top:1px solid rgba(30,41,59,.4);padding-top:10px}
.flow-detail.open{display:block}
.fd-row{display:grid;grid-template-columns:90px 100px 1fr 110px;gap:8px;padding:5px 0;font-size:11px;border-bottom:1px solid rgba(30,41,59,.2);align-items:center}
.fd-row .fd-date{font-family:'JetBrains Mono',monospace;color:var(--muted)}
.fd-row .fd-type{color:var(--text2);font-size:10px}
.fd-row .fd-name{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-row .fd-amt{font-family:'JetBrains Mono',monospace;text-align:right;font-size:12px}
.results{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.results-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.result-box{background:var(--card2);border-radius:10px;padding:16px 20px;border:1px solid var(--border)}
.result-box.full{grid-column:1/-1}
.result-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.result-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.result-value.green{color:var(--green)}.result-value.red{color:var(--red)}
.result-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.acct-results{margin-top:18px}
.acct-result-row{display:grid;grid-template-columns:120px 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(30,41,59,.4);font-size:12px;align-items:center}
.acct-result-row.header{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.acct-result-row .mono{font-family:'JetBrains Mono',monospace;text-align:right}
.acct-result-row .acct-label{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:12px}
.formula-note{margin-top:18px;padding:14px 18px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.7}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.acct-card,.results{animation:fadeUp .4s ease-out backwards}
</style>
</head>
<body>
<div class="container">
<div class="nav">
  <a href="/" class="active">손익 계산기</a>
  <a href="/cashflow.html">입출금 내역</a>
  <a href="/daily.html">일별 손익</a>
  <a href="/total.html">전체 손익</a>
</div>
<div class="header">
  <h1>계좌별 잔액 기반 손익 계산기</h1>
  <p>신한투자증권 5개 계좌 · 기초잔액 자동 반영</p>
</div>
<div class="note">
  각 계좌의 <strong>현재 총 평가잔액</strong>을 MTS/HTS에서 확인하여 입력하세요.<br>
  기초잔액(8/1)은 거래내역에서 자동 산출 · 손익 = 현재잔액 - 기초잔액 - 순입금
</div>

<!-- Date picker + save -->
<div class="date-bar">
  <label>입력일</label>
  <input type="date" id="pickDate" />
  <button class="save-btn primary" onclick="saveDay()">저장</button>
  <span class="save-msg" id="saveMsg">저장 완료</span>
  <button class="save-btn danger" onclick="deleteDay()">이 날짜 삭제</button>
</div>

<!-- History -->
<div class="history-panel">
  <button class="history-toggle" id="histToggle" onclick="toggleHist()">▼ 일별 저장 내역</button>
  <div class="history-body" id="histBody"></div>
</div>

<div class="acct-list" id="acct-list"></div>

<!-- 꿈비 주식 -->

  <div style="display:flex;align-items:center;gap:14px"><label style="font-size:13px;color:#94a3b8;white-space:nowrap;min-width:100px">꿈비 손익</label><div class="input-wrap"><span class="prefix">₩</span><input type="text" id="c_kkumbi" placeholder="꿈비 손익금액 (음수 가능)" oninput="fc(this)" style="width:100%;padding:10px 14px 10px 28px;background:#1a2236;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;text-align:right"/></div></div>
</div>

<!-- 한국투자증권 일임 -->
<div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px 24px;margin-bottom:16px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-family:'JetBrains Mono',monospace;font-size:15px;color:#8b5cf6;font-weight:600">한국투자증권 일임</span><span style="font-size:11px;color:#64748b;background:#1a2236;padding:3px 10px;border-radius:12px">원금 각 3억</span></div>
  <div style="display:flex;align-items:center;gap:14px;margin-bottom:10px"><label style="font-size:13px;color:#94a3b8;white-space:nowrap;min-width:100px">국내주식 잔액</label><div class="input-wrap"><span class="prefix">₩</span><input type="text" id="c_hk_dom" placeholder="한투 국내주식 일임 잔액" oninput="fc(this)" style="width:100%;padding:10px 14px 10px 28px;background:#1a2236;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;text-align:right"/></div></div>
  <div style="display:flex;align-items:center;gap:14px"><label style="font-size:13px;color:#94a3b8;white-space:nowrap;min-width:100px">해외주식 잔액</label><div class="input-wrap"><span class="prefix">₩</span><input type="text" id="c_hk_ovs" placeholder="한투 해외주식 일임 잔액" oninput="fc(this)" style="width:100%;padding:10px 14px 10px 28px;background:#1a2236;border:1px solid #1e293b;border-radius:8px;color:#e2e8f0;font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;text-align:right"/></div></div>
</div>

<div class="results" id="results" style="display:none"></div>

<!-- 그래프 -->
<div id="chartSection" style="display:none">
<div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px 24px;margin-bottom:16px">
  <div style="font-size:14px;font-weight:600;margin-bottom:14px;color:#06b6d4">일별 수익 추이</div>
  <canvas id="dailyChart" height="200"></canvas>
</div>
<div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px 24px;margin-bottom:16px">
  <div style="font-size:14px;font-weight:600;margin-bottom:14px;color:#f59e0b">월별 수익</div>
  <canvas id="monthlyChart" height="200"></canvas>
</div>
<div style="background:#111827;border:1px solid #1e293b;border-radius:12px;padding:20px 24px;margin-bottom:16px">
  <div style="font-size:14px;font-weight:600;margin-bottom:14px;color:#10b981">누적 수익 추이</div>
  <canvas id="cumChart" height="200"></canvas>
</div>
</div>

var STORE_KEY="inv_daily_v2";
var CF_KEY="inv_cf_v2";

function getStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};}}
function setStore(obj){localStorage.setItem(STORE_KEY,JSON.stringify(obj));}

function initDate(){
  var d=new Date();
  var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");
  document.getElementById("pickDate").value=y+"-"+m+"-"+day;
}

function loadDay(dateStr){
  document.getElementById("pickDate").value=dateStr;
  var store=getStore();
  var rec=store[dateStr];
  if(rec){
    for(var i=0;i<A.length;i++){
      var el=document.getElementById("c_"+A[i].id);
      if(rec[A[i].id]){el.value=Number(rec[A[i].id]).toLocaleString("ko-KR");}else{el.value="";}
    }
    if(rec.kkumbi){document.getElementById("c_kkumbi").value=Number(rec.kkumbi).toLocaleString("ko-KR");}else{document.getElementById("c_kkumbi").value="";}
    if(rec.hk_dom){document.getElementById("c_hk_dom").value=Number(rec.hk_dom).toLocaleString("ko-KR");}else{document.getElementById("c_hk_dom").value="";}
    if(rec.hk_ovs){document.getElementById("c_hk_ovs").value=Number(rec.hk_ovs).toLocaleString("ko-KR");}else{document.getElementById("c_hk_ovs").value="";}
  }else{
    for(var i=0;i<A.length;i++){document.getElementById("c_"+A[i].id).value="";}
    document.getElementById("c_kkumbi").value="";
    document.getElementById("c_hk_dom").value="";
    document.getElementById("c_hk_ovs").value="";
  }
  calc();
  renderHist();
}

function saveDay(){
  var dateStr=document.getElementById("pickDate").value;
  if(!dateStr){alert("날짜를 선택하세요.");return;}
  var store=getStore();
  var rec={};
  var hasAny=false;
  for(var i=0;i<A.length;i++){
    var v=pn(document.getElementById("c_"+A[i].id).value);
    rec[A[i].id]=v;
    if(v)hasAny=true;
  }
  rec.kkumbi=pn(document.getElementById("c_kkumbi").value);
  rec.hk_dom=pn(document.getElementById("c_hk_dom").value);
  rec.hk_ovs=pn(document.getElementById("c_hk_ovs").value);
  if(rec.kkumbi||rec.hk_dom||rec.hk_ovs)hasAny=true;
  if(!hasAny){alert("최소 한 계좌의 잔액을 입력하세요.");return;}
  // calc total pnl for storage
  var tP=0;
  for(var i=0;i<A.length;i++){
    var a=A[i];var c=rec[a.id]||0;var n=a.d-a.w;tP+=c-a.bb-n;
  }
  // 한투 손익 포함, 꿈비손익 차감
  tP+=(rec.hk_dom-300000000)+(rec.hk_ovs-300000000);
  tP-=rec.kkumbi;  // 꿈비손익 차감 (입력값이 꿈비손익 자체)
  rec._totalPnl=tP;
  var tC=0;for(var i=0;i<A.length;i++){tC+=rec[A[i].id]||0;}
  tC+=rec.hk_dom+rec.hk_ovs;
  rec._totalBal=tC;
  store[dateStr]=rec;
  setStore(store);
  var msg=document.getElementById("saveMsg");
  msg.classList.add("show");
  setTimeout(function(){msg.classList.remove("show");},2000);
  renderHist();
  renderCharts();
}

function deleteDay(){
  var dateStr=document.getElementById("pickDate").value;
  if(!dateStr)return;
  var store=getStore();
  if(!store[dateStr]){alert("이 날짜에 저장된 데이터가 없습니다.");return;}
  if(!confirm(dateStr+" 데이터를 삭제하시겠습니까?"))return;
  delete store[dateStr];
  setStore(store);
  for(var i=0;i<A.length;i++){document.getElementById("c_"+A[i].id).value="";}
  calc();
  renderHist();
}

function toggleHist(){
  var body=document.getElementById("histBody");
  body.classList.toggle("open");
  var btn=document.getElementById("histToggle");
  btn.textContent=body.classList.contains("open")?"▲ 일별 저장 내역 접기":"▼ 일별 저장 내역";
}

function renderHist(){
  var store=getStore();
  var keys=Object.keys(store).sort().reverse();
  var body=document.getElementById("histBody");
  if(keys.length===0){
    body.innerHTML="<div class='h-empty'>저장된 내역이 없습니다. 잔액 입력 후 [저장]을 누르세요.</div>";
    return;
  }
  var h="<table class='h-table'><thead><tr><th>날짜</th><th class='r'>총 잔액</th><th class='r'>총 손익</th><th class='r'>전일비</th><th></th></tr></thead><tbody>";
  for(var i=0;i<keys.length;i++){
    var k=keys[i];var rec=store[k];
    var pnl=rec._totalPnl||0;
    var bal=rec._totalBal||0;
    var pc=pnl>=0?"color:#10b981":"color:#ef4444";
    // daily diff
    var diff="";
    if(i<keys.length-1){
      var prevK=keys[i+1];var prevRec=store[prevK];
      var prevPnl=prevRec._totalPnl||0;
      var d=pnl-prevPnl;
      var dc=d>=0?"color:#10b981":"color:#ef4444";
      diff="<span style='"+dc+"'>"+fs(d)+"</span>";
    }
    h+="<tr class='clickable' onclick=\"loadDay('"+k+"')\">";
    h+="<td>"+k+"</td>";
    h+="<td class='r'>"+fmt(bal)+"</td>";
    h+="<td class='r' style='"+pc+";font-weight:500'>"+fs(pnl)+"</td>";
    h+="<td class='r'>"+diff+"</td>";
    h+="<td><button class='del-btn' onclick=\"event.stopPropagation();delHist('"+k+"')\">✕</button></td>";
    h+="</tr>";
  }
  h+="</tbody></table>";
  body.innerHTML=h;
}

function delHist(k){
  if(!confirm(k+" 삭제?"))return;
  var store=getStore();delete store[k];setStore(store);renderHist();renderCharts();
}

function fmt(n){if(n===0)return"0";return Math.abs(Math.round(n)).toLocaleString("ko-KR")}
function fs(n){if(n===0)return"0";return(n>0?"+":"-")+fmt(n)}

function pn(s){if(!s)return 0;return parseInt(s.replace(/[^0-9\-]/g,""),10)||0}

function fc(el){
  var r=el.value.replace(/[^0-9\-]/g,"");
  if(!r||r==="-"){el.value=r;calc();return}
  var n=parseInt(r,10);
  if(isNaN(n)){calc();return}
  el.value=n.toLocaleString("ko-KR");
  calc();
}

  // 한투 행
  if(hkDom){rhtml+="<div class='acct-result-row'><div class='acct-label' style='color:#8b5cf6'>한투 국내</div><div class='mono'>300,000,000</div><div class='mono'>"+fmt(hkDom)+"</div><div class='mono' style='color:"+(hkDomPnl>=0?"#10b981":"#ef4444")+";font-weight:600'>"+fs(hkDomPnl)+"</div><div class='mono' style='color:"+(hkDomPnl>=0?"#10b981":"#ef4444")+"'>"+(hkDomPnl/300000000*100).toFixed(1)+"%</div></div>";}
  if(hkOvs){rhtml+="<div class='acct-result-row'><div class='acct-label' style='color:#8b5cf6'>한투 해외</div><div class='mono'>300,000,000</div><div class='mono'>"+fmt(hkOvs)+"</div><div class='mono' style='color:"+(hkOvsPnl>=0?"#10b981":"#ef4444")+";font-weight:600'>"+fs(hkOvsPnl)+"</div><div class='mono' style='color:"+(hkOvsPnl>=0?"#10b981":"#ef4444")+"'>"+(hkOvsPnl/300000000*100).toFixed(1)+"%</div></div>";}
  rhtml+="<div class='acct-result-row' style='border-top:2px solid #3b82f6;font-weight:600'><div>합계</div><div class='mono'>"+fmt(REMAINING)+"</div><div class='mono'>"+fmt(totalBal)+"</div><div class='mono' style='color:"+(totalPnl>=0?"#10b981":"#ef4444")+"'>"+fs(totalPnl)+"</div><div class='mono' style='color:"+(totalPnl>=0?"#10b981":"#ef4444")+"'>"+pp.toFixed(1)+"%</div></div>";
  rhtml+="</div>";
  rhtml+="<div class='formula-note'><strong>전체투자손익 = (신한5계좌 + 한투2계좌 - 잔류원금) - 꿈비손익</strong><br>잔류원금 24.3억 = 투입 53.5억 - 출금 29.2억<br>꿈비 평가가 637잔액에 포함되어 있으므로, 꿈비손익을 직접 입력하여 전체손익에서 차감</div>";
  el.innerHTML=rhtml;
}

var dailyChartObj=null,monthlyChartObj=null,cumChartObj=null;

function renderCharts(){
  var store=getStore();
  var REMAINING=2430528613;
  var dates=Object.keys(store).sort();
  if(dates.length<2){document.getElementById("chartSection").style.display="none";return;}
  document.getElementById("chartSection").style.display="block";

  // 일별 데이터 계산
  var labels=[],dailyPnl=[],cumPnl=[],balances=[];
  var prevBal=0;
  for(var i=0;i<dates.length;i++){
    var d=dates[i];
    var rec=store[d];
    var bal=0;
    bal+=(rec["134"]||0)+(rec["142"]||0)+(rec["161"]||0)+(rec["614"]||0)+(rec["637"]||0);
    bal+=(rec.hk_dom||0)+(rec.hk_ovs||0);
    var cum=bal-REMAINING;
    var daily=(i===0)?cum:(bal-prevBal);
    // 입출금 차감 (당일 cf가 있으면)
    var cfs=getCfStore?getCfStore():{};
    var cfList=cfs[d]||[];
    var cfTotal=0;for(var j=0;j<cfList.length;j++)cfTotal+=cfList[j].v;
    if(i>0)daily-=cfTotal;
    labels.push(d.slice(5));
    dailyPnl.push(Math.round(daily/10000));
    cumPnl.push(Math.round(cum/10000));
    balances.push(bal);
    prevBal=bal;
  }

  // 월별 집계
  var monthMap={};
  for(var i=0;i<dates.length;i++){
    var m=dates[i].slice(0,7);
    if(!monthMap[m])monthMap[m]={first:0,last:0,cf:0,idx:i};
    var rec=store[dates[i]];
    var bal=0;
    bal+=(rec["134"]||0)+(rec["142"]||0)+(rec["161"]||0)+(rec["614"]||0)+(rec["637"]||0);
    bal+=(rec.hk_dom||0)+(rec.hk_ovs||0);
    if(monthMap[m].idx===i)monthMap[m].first=bal;
    monthMap[m].last=bal;
  }
  var mLabels=[],mPnl=[];
  var mKeys=Object.keys(monthMap).sort();
  for(var i=0;i<mKeys.length;i++){
    var mk=mKeys[i];
    var mp=monthMap[mk];
    var pnl=(i===0)?(mp.last-REMAINING):(mp.last-monthMap[mKeys[i-1]].last);
    mLabels.push(mk.slice(2));
    mPnl.push(Math.round(pnl/10000));
  }

  var chartOpts={responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw.toLocaleString()+"만원"}}}},scales:{x:{ticks:{color:"#64748b",font:{size:10}},grid:{color:"rgba(30,41,59,.3)"}},y:{ticks:{color:"#64748b",font:{size:10},callback:function(v){return v.toLocaleString()}},grid:{color:"rgba(30,41,59,.3)"}}}};

  // 일별 차트
  if(dailyChartObj)dailyChartObj.destroy();
  dailyChartObj=new Chart(document.getElementById("dailyChart"),{type:"bar",data:{labels:labels,datasets:[{data:dailyPnl,backgroundColor:dailyPnl.map(function(v){return v>=0?"rgba(16,185,129,.6)":"rgba(239,68,68,.6)"}),borderRadius:3}]},options:chartOpts});

  // 월별 차트
  if(monthlyChartObj)monthlyChartObj.destroy();
  monthlyChartObj=new Chart(document.getElementById("monthlyChart"),{type:"bar",data:{labels:mLabels,datasets:[{data:mPnl,backgroundColor:mPnl.map(function(v){return v>=0?"rgba(245,158,11,.6)":"rgba(239,68,68,.6)"}),borderRadius:4}]},options:chartOpts});

  // 누적 차트
  if(cumChartObj)cumChartObj.destroy();
  cumChartObj=new Chart(document.getElementById("cumChart"),{type:"line",data:{labels:labels,datasets:[{data:cumPnl,borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.1)",fill:true,tension:.3,pointRadius:3,pointBackgroundColor:"#10b981"}]},options:chartOpts});
}

function getCfStore(){try{return JSON.parse(localStorage.getItem(CF_KEY))||{};}catch(e){return {};}}

// Init
render();
initDate();
renderHist();
renderCharts();

// Auto-load if today has saved data
(function(){
  var dateStr=document.getElementById("pickDate").value;
  var store=getStore();
  if(store[dateStr]){loadDay(dateStr);}
})();
</script>
