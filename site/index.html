<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계좌 손익 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b}*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.container{max-width:900px;margin:0 auto;padding:24px 20px}.header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.header p{color:var(--muted);font-size:13px;margin-top:6px;font-family:'JetBrains Mono',monospace}.note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--blue);margin-bottom:24px;line-height:1.7}.acct-list{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}.acct-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color .2s}.acct-card:hover{border-color:var(--cyan)}.acct-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.acct-name{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);font-weight:600}.acct-badge{font-size:11px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:12px}.acct-flows{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(30,41,59,.5)}.flow-label{font-size:11px;color:var(--muted);margin-bottom:3px}.flow-value{font-family:'JetBrains Mono',monospace;font-size:13px}.flow-value.in{color:var(--green)}.flow-value.out{color:var(--red)}.flow-value.base{color:var(--text)}.input-row{display:flex;align-items:center;gap:14px}.input-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:100px}.input-wrap{flex:1;position:relative}.input-wrap span.prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}.input-wrap input{width:100%;padding:10px 14px 10px 28px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;transition:border-color .2s;text-align:right}.input-wrap input:focus{border-color:var(--cyan)}.input-wrap input::placeholder{color:var(--muted);font-size:12px}.results{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}.results-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}.result-box{background:var(--card2);border-radius:10px;padding:16px 20px;border:1px solid var(--border)}.result-box.full{grid-column:1/-1}.result-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}.result-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}.result-value.green{color:var(--green)}.result-value.red{color:var(--red)}.result-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}.acct-results{margin-top:18px}.acct-result-row{display:grid;grid-template-columns:120px 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(30,41,59,.4);font-size:12px;align-items:center}.acct-result-row.header{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}.acct-result-row .mono{font-family:'JetBrains Mono',monospace;text-align:right}.acct-result-row .acct-label{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:12px}.formula-note{margin-top:18px;padding:14px 18px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.7}@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.acct-card,.results{animation:fadeUp .4s ease-out backwards}
</style>
</head>
<body>
<div class="container">
<div class="header">
  <h1>계좌별 잔액 기반 손익 계산기</h1>
  <p>신한투자증권 5개 계좌 · 기초잔액 자동 반영</p>
</div>
<div class="note">
  💡 각 계좌의 <strong>현재 총 평가잔액</strong>을 MTS/HTS에서 확인하여 입력하세요.<br>
  &nbsp;&nbsp;&nbsp;기초잔액(8/1)은 거래내역에서 자동 산출 · 손익 = 현재잔액 - 기초잔액 - 순입금
</div>
<div class="acct-list" id="acct-list"></div>
<div class="results" id="results" style="display:none"></div>
</div>
<script>
const A=[
  {id:'134',num:'270-84-***134',label:'대형주',d:100000000,w:157662,bb:160170200},
  {id:'142',num:'270-84-***142',label:'ETF+개별',d:0,w:0,bb:51715262},
  {id:'161',num:'270-85-***161',label:'IRP',d:14000000,w:0,bb:0},
  {id:'614',num:'270-87-***614',label:'중소형주',d:0,w:273653488,bb:300000000},
  {id:'637',num:'270-25-***637',label:'종합',d:320943102,w:2249919000,bb:1666803484}
];
function fmt(n){if(n===0)return'0';return Math.abs(Math.round(n)).toLocaleString('ko-KR')}
function fs(n){if(n===0)return'0';return(n>0?'+':'-')+fmt(n)}
function render(){const l=document.getElementById('acct-list');l.innerHTML='';A.forEach(a=>{const n=a.d-a.w;l.innerHTML+=`<div class="acct-card"><div class="acct-top"><span class="acct-name">${a.num}</span><span class="acct-badge">${a.label}</span></div><div class="acct-flows"><div><div class="flow-label">기초잔액(8/1)</div><div class="flow-value base">${fmt(a.bb)}</div></div><div><div class="flow-label">입금</div><div class="flow-value in">${a.d>0?'+'+fmt(a.d):'-'}</div></div><div><div class="flow-label">출금</div><div class="flow-value out">${a.w>0?'-'+fmt(a.w):'-'}</div></div><div><div class="flow-label">순입금</div><div class="flow-value ${n>=0?'in':'out'}">${fs(n)}</div></div></div><div class="input-row"><label>현재잔액 입력</label><div class="input-wrap"><span class="prefix">₩</span><input type="text" id="c_${a.id}" placeholder="현재 총 평가잔액" oninput="fc(this)"/></div></div></div>`})}
function pn(s){if(!s)return 0;return parseInt(s.replace(/[^0-9-]/g,''),10)||0}
function fc(el){const r=el.value.replace(/[^0-9-]/g,'');if(!r||r==='-'){el.value=r;calc();return}const n=parseInt(r,10);if(isNaN(n)){calc();return}el.value=n.toLocaleString('ko-KR');calc()}
function calc(){let h=false,tB=0,tC=0,tN=0,tP=0;const R=[];A.forEach(a=>{const c=pn(document.getElementById('c_'+a.id).value);const n=a.d-a.w;if(c)h=true;const p=c-a.bb-n;tB+=a.bb;tC+=c;tN+=n;tP+=p;R.push({...a,c,n,p})});const el=document.getElementById('results');if(!h){el.style.display='none';return}el.style.display='block';const pc=tP>=0?'green':'red';const pp=tB>0?(tP/tB*100):0;el.innerHTML=`<div class="results-title">📊 전체 투자 손익</div><div class="result-grid"><div class="result-box full"><div class="result-label">총 손익</div><div class="result-value ${pc}">${fs(tP)}원</div><div class="result-sub">${tB>0?'수익률 '+(tP>=0?'+':'')+pp.toFixed(2)+'%':''}</div></div><div class="result-box"><div class="result-label">기초잔액 합계(8/1)</div><div class="result-value" style="font-size:18px">${fmt(tB)}</div></div><div class="result-box"><div class="result-label">현재잔액 합계</div><div class="result-value" style="font-size:18px">${fmt(tC)}</div></div><div class="result-box"><div class="result-label">순입금(입금-출금)</div><div class="result-value" style="font-size:18px;color:${tN>=0?'var(--green)':'var(--red)'}">${fs(tN)}</div></div><div class="result-box"><div class="result-label">수수료+세금(참고)</div><div class="result-value" style="font-size:18px;color:var(--amber)">6,273,588</div></div></div><div class="acct-results"><div class="acct-result-row header"><div>계좌</div><div class="mono">기초(8/1)</div><div class="mono">순입금</div><div class="mono">현재잔액</div><div class="mono">손익</div></div>${R.map(r=>`<div class="acct-result-row"><div class="acct-label">${r.num.slice(-6)}</div><div class="mono">${fmt(r.bb)}</div><div class="mono" style="color:${r.n>=0?'var(--green)':'var(--red)'}">${fs(r.n)}</div><div class="mono">${fmt(r.c)}</div><div class="mono" style="color:${r.p>=0?'var(--green)':'var(--red)'};font-weight:600">${fs(r.p)}</div></div>`).join('')}<div class="acct-result-row" style="border-top:2px solid var(--blue);font-weight:600"><div>합계</div><div class="mono">${fmt(tB)}</div><div class="mono" style="color:${tN>=0?'var(--green)':'var(--red)'}">${fs(tN)}</div><div class="mono">${fmt(tC)}</div><div class="mono" style="color:${tP>=0?'var(--green)':'var(--red)'}">${fs(tP)}</div></div></div><div class="formula-note">📐 <strong>손익 = 현재잔액 − 기초잔액(8/1) − 순입금</strong><br>기초잔액: 거래내역 시작시점 역산값 · 순입금: 외부 입출금(은행이체·계좌대체·전환)</div>`}
render();
</script>
</body>
</html>
