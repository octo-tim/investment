<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계좌 손익 계산기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:900px;margin:0 auto;padding:24px 20px}
.nav{display:flex;gap:10px;margin-bottom:20px}
.nav a{padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #334155;color:#94a3b8;background:#1e293b}
.nav a.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.header{text-align:center;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.header h1{font-size:24px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:13px;margin-top:6px;font-family:'JetBrains Mono',monospace}
.note{background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:14px 18px;font-size:13px;color:var(--blue);margin-bottom:24px;line-height:1.7}
.acct-list{display:flex;flex-direction:column;gap:16px;margin-bottom:28px}
.acct-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;transition:border-color .2s}
.acct-card:hover{border-color:var(--cyan)}
.acct-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.acct-name{font-family:'JetBrains Mono',monospace;font-size:15px;color:var(--cyan);font-weight:600}
.acct-badge{font-size:11px;color:var(--muted);background:var(--card2);padding:3px 10px;border-radius:12px}
.acct-flows{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid rgba(30,41,59,.5)}
.flow-label{font-size:11px;color:var(--muted);margin-bottom:3px}
.flow-value{font-family:'JetBrains Mono',monospace;font-size:13px}
.flow-value.in{color:var(--green)}.flow-value.out{color:var(--red)}.flow-value.base{color:var(--text)}
.input-row{display:flex;align-items:center;gap:14px}
.input-row label{font-size:13px;color:var(--text2);white-space:nowrap;min-width:100px}
.input-wrap{flex:1;position:relative}
.input-wrap span.prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.input-wrap input{width:100%;padding:10px 14px 10px 28px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;outline:none;transition:border-color .2s;text-align:right}
.input-wrap input:focus{border-color:var(--cyan)}
.input-wrap input::placeholder{color:var(--muted);font-size:12px}
.toggle-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:6px;cursor:pointer;margin-top:10px;font-family:'Noto Sans KR',sans-serif}
.toggle-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.flow-detail{display:none;margin-top:12px;border-top:1px solid rgba(30,41,59,.4);padding-top:10px}
.flow-detail.open{display:block}
.fd-row{display:grid;grid-template-columns:90px 100px 1fr 110px;gap:8px;padding:5px 0;font-size:11px;border-bottom:1px solid rgba(30,41,59,.2);align-items:center}
.fd-row .fd-date{font-family:'JetBrains Mono',monospace;color:var(--muted)}
.fd-row .fd-type{color:var(--text2);font-size:10px}
.fd-row .fd-name{color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fd-row .fd-amt{font-family:'JetBrains Mono',monospace;text-align:right;font-size:12px}
.results{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.results-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.result-box{background:var(--card2);border-radius:10px;padding:16px 20px;border:1px solid var(--border)}
.result-box.full{grid-column:1/-1}
.result-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.result-value{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600}
.result-value.green{color:var(--green)}.result-value.red{color:var(--red)}
.result-sub{font-size:12px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace}
.acct-results{margin-top:18px}
.acct-result-row{display:grid;grid-template-columns:120px 1fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-bottom:1px solid rgba(30,41,59,.4);font-size:12px;align-items:center}
.acct-result-row.header{color:var(--muted);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.acct-result-row .mono{font-family:'JetBrains Mono',monospace;text-align:right}
.acct-result-row .acct-label{font-family:'JetBrains Mono',monospace;color:var(--cyan);font-size:12px}
.formula-note{margin-top:18px;padding:14px 18px;background:rgba(245,158,11,.06);border:1px solid rgba(245,158,11,.15);border-radius:8px;font-size:12px;color:var(--amber);line-height:1.7}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.acct-card,.results{animation:fadeUp .4s ease-out backwards}
</style>
</head>
<body>
<div class="container">
<div class="nav">
  <a href="/" class="active">손익 계산기</a>
  <a href="/cashflow.html">입출금 내역</a>
</div>
<div class="header">
  <h1>계좌별 잔액 기반 손익 계산기</h1>
  <p>신한투자증권 5개 계좌 · 기초잔액 자동 반영</p>
</div>
<div class="note">
  각 계좌의 <strong>현재 총 평가잔액</strong>을 MTS/HTS에서 확인하여 입력하세요.<br>
  기초잔액(8/1)은 거래내역에서 자동 산출 · 손익 = 현재잔액 - 기초잔액 - 순입금
</div>
<div class="acct-list" id="acct-list"></div>
<div class="results" id="results" style="display:none"></div>
</div>
<script>
var A=[
  {id:"134",num:"270-84-***134",label:"대형주",d:100000000,w:157662,bb:160170200},
  {id:"142",num:"270-84-***142",label:"ETF+개별",d:0,w:0,bb:51715262},
  {id:"161",num:"270-85-***161",label:"IRP",d:14000000,w:0,bb:0},
  {id:"614",num:"270-87-***614",label:"중소형주",d:0,w:273653488,bb:300000000},
  {id:"637",num:"270-25-***637",label:"종합",d:320943102,w:2249919000,bb:1666803484}
];
var F={"134":[{"d":"2026/03/31","g":"계좌대체출금","v":-157662,"nm":"윤경식"},{"d":"2026/03/06","g":"계좌대체입금","v":100000000,"nm":"윤경식"}],"142":[],"161":[{"d":"2025/11/16","g":"계좌대체입금","v":14000000,"nm":"윤경식"}],"614":[{"d":"2026/03/26","g":"계좌대체출금","v":-13848278,"nm":"윤경식"},{"d":"2026/03/26","g":"계좌대체출금","v":-100000000,"nm":"윤경식"},{"d":"2026/03/26","g":"전환출금","v":-100000000,"nm":"출금"},{"d":"2026/03/26","g":"은행이체출금","v":-15196500,"nm":"윤경식"},{"d":"2026/03/26","g":"은행이체출금","v":-44608710,"nm":"국세청"}],"637":[{"d":"2026/03/31","g":"계좌대체입금","v":157662,"nm":"윤경식"},{"d":"2026/03/31","g":"전환출금","v":-15000000,"nm":"출금"},{"d":"2026/03/31","g":"전환출금","v":-30000000,"nm":"출금"},{"d":"2026/03/31","g":"전환출금","v":-70000000,"nm":"출금"},{"d":"2026/03/31","g":"전환입금","v":132749383,"nm":"입금"},{"d":"2026/03/31","g":"전환출금","v":-25000000,"nm":"출금"},{"d":"2026/03/31","g":"전환출금","v":-30000000,"nm":"출금"},{"d":"2026/03/26","g":"전환출금","v":-30000000,"nm":"출금"},{"d":"2026/03/26","g":"전환출금","v":-30000000,"nm":"출금"},{"d":"2026/03/26","g":"계좌대체입금","v":13848278,"nm":"윤경식"},{"d":"2026/03/18","g":"은행이체출금","v":-100000000,"nm":"부여캠프힐"},{"d":"2026/03/18","g":"은행이체출금","v":-100000000,"nm":"부여캠프힐"},{"d":"2026/02/20","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/20","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/20","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/20","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/20","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/13","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/13","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/13","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/13","g":"은행이체출금","v":-100000000,"nm":"국세"},{"d":"2026/02/04","g":"은행이체출금","v":-2000000,"nm":"윤경식"},{"d":"2026/01/27","g":"전환출금","v":-20000000,"nm":"출금"},{"d":"2026/01/27","g":"전환출금","v":-20000000,"nm":"출금"},{"d":"2026/01/26","g":"전환외화입금","v":29594,"nm":"외화입금"},{"d":"2026/01/26","g":"전환입금","v":71008000,"nm":"입금"},{"d":"2026/01/24","g":"전환출금","v":-30000000,"nm":"출금"},{"d":"2026/01/22","g":"은행이체출금","v":-6000000,"nm":"서도푸드"},{"d":"2026/01/19","g":"은행이체출금","v":-10000000,"nm":"윤경식"},{"d":"2026/01/17","g":"은행이체출금","v":-1000000,"nm":"윤경식"},{"d":"2026/01/13","g":"전환외화입금","v":7311,"nm":"외화"},{"d":"2026/01/12","g":"전환외화입금","v":54676,"nm":"외화"},{"d":"2026/01/02","g":"은행이체입금","v":50000000,"nm":"윤경식"},{"d":"2025/12/31","g":"계좌대체입금","v":24120,"nm":"윤경식"},{"d":"2025/12/30","g":"전환외화출금","v":-70000,"nm":"외화출금"},{"d":"2025/12/29","g":"전환출금","v":-50000000,"nm":"출금"},{"d":"2025/12/27","g":"은행이체출금","v":-1000000,"nm":"윤경식"},{"d":"2025/12/19","g":"은행이체입금","v":2000000,"nm":"최미진"},{"d":"2025/12/18","g":"은행이체입금","v":1000000,"nm":"비바리퍼블리카"},{"d":"2025/12/18","g":"전환입금","v":64076,"nm":"입금"},{"d":"2025/11/28","g":"은행이체입금","v":50000000,"nm":"윤경식"},{"d":"2025/11/24","g":"계좌대체출금","v":-40000000,"nm":"윤경식"},{"d":"2025/11/24","g":"계좌대체출금","v":-100000000,"nm":"윤경식"},{"d":"2025/11/24","g":"전환출금","v":-40000000,"nm":"출금"},{"d":"2025/11/19","g":"계좌대체출금","v":-18000000,"nm":"최미진"},{"d":"2025/11/16","g":"계좌대체출금","v":-14000000,"nm":"윤경식"},{"d":"2025/11/13","g":"은행이체출금","v":-60000000,"nm":"최미진"},{"d":"2025/11/13","g":"은행이체출금","v":-100000000,"nm":"최미진"},{"d":"2025/11/13","g":"은행이체출금","v":-100000000,"nm":"최미진"},{"d":"2025/11/12","g":"은행이체출금","v":-60000000,"nm":"윤경식"},{"d":"2025/11/12","g":"은행이체출금","v":-100000000,"nm":"윤경식"},{"d":"2025/11/12","g":"은행이체출금","v":-100000000,"nm":"윤경식"},{"d":"2025/11/05","g":"계좌대체출금","v":-27849999,"nm":"윤경식"},{"d":"2025/10/31","g":"계좌대체출금","v":-19999000,"nm":"최미진"}]};

function fmt(n){if(n===0)return"0";return Math.abs(Math.round(n)).toLocaleString("ko-KR")}
function fs(n){if(n===0)return"0";return(n>0?"+":"-")+fmt(n)}

function toggleDetail(id){
  var el=document.getElementById("fd_"+id);
  el.classList.toggle("open");
  var btn=document.getElementById("btn_"+id);
  btn.textContent=el.classList.contains("open")?"▲ 내역 접기":"▼ 입출금 내역 보기";
}

function render(){
  var l=document.getElementById("acct-list");
  var html="";
  for(var i=0;i<A.length;i++){
    var a=A[i];
    var n=a.d-a.w;
    var flows=F[a.id]||[];
    var hasFlows=flows.length>0;
    var flowHtml="";
    if(hasFlows){
      flowHtml="<button class='toggle-btn' id='btn_"+a.id+"' onclick=\"toggleDetail('"+a.id+"')\">▼ 입출금 내역 보기 ("+flows.length+"건)</button>";
      flowHtml+="<div class='flow-detail' id='fd_"+a.id+"'>";
      for(var j=0;j<flows.length;j++){
        var f=flows[j];
        var c=f.v>0?"color:#10b981":"color:#ef4444";
        flowHtml+="<div class='fd-row'><div class='fd-date'>"+f.d.slice(5)+"</div><div class='fd-type'>"+f.g+"</div><div class='fd-name'>"+f.nm+"</div><div class='fd-amt' style='"+c+"'>"+fs(f.v)+"</div></div>";
      }
      flowHtml+="</div>";
    }
    html+="<div class='acct-card'><div class='acct-top'><span class='acct-name'>"+a.num+"</span><span class='acct-badge'>"+a.label+"</span></div><div class='acct-flows'><div><div class='flow-label'>기초잔액(8/1)</div><div class='flow-value base'>"+fmt(a.bb)+"</div></div><div><div class='flow-label'>입금</div><div class='flow-value in'>"+(a.d>0?"+"+fmt(a.d):"-")+"</div></div><div><div class='flow-label'>출금</div><div class='flow-value out'>"+(a.w>0?"-"+fmt(a.w):"-")+"</div></div><div><div class='flow-label'>순입금</div><div class='flow-value "+(n>=0?"in":"out")+"'>"+fs(n)+"</div></div></div>"+flowHtml+"<div class='input-row' style='margin-top:12px'><label>현재잔액 입력</label><div class='input-wrap'><span class='prefix'>₩</span><input type='text' id='c_"+a.id+"' placeholder='현재 총 평가잔액' oninput='fc(this)'/></div></div></div>";
  }
  l.innerHTML=html;
}

function pn(s){if(!s)return 0;return parseInt(s.replace(/[^0-9\-]/g,""),10)||0}

function fc(el){
  var r=el.value.replace(/[^0-9\-]/g,"");
  if(!r||r==="-"){el.value=r;calc();return}
  var n=parseInt(r,10);
  if(isNaN(n)){calc();return}
  el.value=n.toLocaleString("ko-KR");
  calc();
}

function calc(){
  var h=false,tB=0,tC=0,tN=0,tP=0;
  var R=[];
  for(var i=0;i<A.length;i++){
    var a=A[i];
    var c=pn(document.getElementById("c_"+a.id).value);
    var n=a.d-a.w;
    if(c)h=true;
    var p=c-a.bb-n;
    tB+=a.bb;tC+=c;tN+=n;tP+=p;
    R.push({num:a.num,bb:a.bb,n:n,c:c,p:p});
  }
  var el=document.getElementById("results");
  if(!h){el.style.display="none";return}
  el.style.display="block";
  var pc=tP>=0?"green":"red";
  var pp=tB>0?(tP/tB*100):0;
  var rhtml="<div class='results-title'>전체 투자 손익</div>";
  rhtml+="<div class='result-grid'>";
  rhtml+="<div class='result-box full'><div class='result-label'>총 손익</div><div class='result-value "+pc+"'>"+fs(tP)+"원</div><div class='result-sub'>"+(tB>0?"수익률 "+(tP>=0?"+":"")+pp.toFixed(2)+"%":"")+"</div></div>";
  rhtml+="<div class='result-box'><div class='result-label'>기초잔액 합계(8/1)</div><div class='result-value' style='font-size:18px'>"+fmt(tB)+"</div></div>";
  rhtml+="<div class='result-box'><div class='result-label'>현재잔액 합계</div><div class='result-value' style='font-size:18px'>"+fmt(tC)+"</div></div>";
  rhtml+="<div class='result-box'><div class='result-label'>순입금(입금-출금)</div><div class='result-value' style='font-size:18px;color:"+(tN>=0?"#10b981":"#ef4444")+"'>"+fs(tN)+"</div></div>";
  rhtml+="<div class='result-box'><div class='result-label'>수수료+세금(참고)</div><div class='result-value' style='font-size:18px;color:#f59e0b'>6,273,588</div></div>";
  rhtml+="</div>";
  rhtml+="<div class='acct-results'>";
  rhtml+="<div class='acct-result-row header'><div>계좌</div><div class='mono'>기초(8/1)</div><div class='mono'>순입금</div><div class='mono'>현재잔액</div><div class='mono'>손익</div></div>";
  for(var i=0;i<R.length;i++){
    var r=R[i];
    rhtml+="<div class='acct-result-row'><div class='acct-label'>"+r.num.slice(-6)+"</div><div class='mono'>"+fmt(r.bb)+"</div><div class='mono' style='color:"+(r.n>=0?"#10b981":"#ef4444")+"'>"+fs(r.n)+"</div><div class='mono'>"+fmt(r.c)+"</div><div class='mono' style='color:"+(r.p>=0?"#10b981":"#ef4444")+";font-weight:600'>"+fs(r.p)+"</div></div>";
  }
  rhtml+="<div class='acct-result-row' style='border-top:2px solid #3b82f6;font-weight:600'><div>합계</div><div class='mono'>"+fmt(tB)+"</div><div class='mono' style='color:"+(tN>=0?"#10b981":"#ef4444")+"'>"+fs(tN)+"</div><div class='mono'>"+fmt(tC)+"</div><div class='mono' style='color:"+(tP>=0?"#10b981":"#ef4444")+"'>"+fs(tP)+"</div></div>";
  rhtml+="</div>";
  rhtml+="<div class='formula-note'><strong>손익 = 현재잔액 - 기초잔액(8/1) - 순입금</strong><br>기초잔액: 거래내역 시작시점 역산값 · 순입금: 외부 입출금(은행이체·계좌대체·전환)</div>";
  el.innerHTML=rhtml;
}
render();
</script>
</body>
</html>
