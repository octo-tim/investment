<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일별 손익</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#0b0f1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#e2e8f0;--text2:#94a3b8;--muted:#64748b;--blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 20px}
.nav{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.nav a{padding:8px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:500;border:1px solid #334155;color:#94a3b8;background:#1e293b}
.nav a.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.header{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:var(--muted);font-size:12px;margin-top:4px;font-family:'JetBrains Mono',monospace}
.section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px}
.section-title{font-size:14px;font-weight:600;margin-bottom:14px;color:var(--cyan);display:flex;align-items:center;gap:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;text-align:center}
.kpi-label{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:600}
.kpi-val.green{color:var(--green)}.kpi-val.red{color:var(--red)}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:2px;font-family:'JetBrains Mono',monospace}
.h-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;background:rgba(30,41,59,.5);border-bottom:1px solid var(--border);white-space:nowrap;position:sticky;top:0}
th.r{text-align:right}
td{padding:7px 10px;border-bottom:1px solid rgba(30,41,59,.3);white-space:nowrap;font-family:'JetBrains Mono',monospace}
td.r{text-align:right}
tr:hover td{background:var(--card2)}
.clickable{cursor:pointer}
.empty-msg{padding:30px;text-align:center;color:var(--muted);font-size:13px;line-height:1.8}
/* Detail panel */
.detail-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px 20px;margin-bottom:16px;display:none}
.detail-panel.open{display:block}
.detail-row{display:grid;grid-template-columns:140px 1fr 1fr;gap:8px;padding:7px 0;border-bottom:1px solid rgba(30,41,59,.2);font-size:12px;align-items:center}
.detail-row:last-child{border-bottom:none}
.detail-row .lbl{color:var(--cyan);font-family:'JetBrains Mono',monospace;font-size:11px}
.detail-row .lbl.amber{color:var(--amber)}
.detail-row .lbl.purple{color:var(--purple)}
.detail-row .val{font-family:'JetBrains Mono',monospace;text-align:right;font-size:12px}
.link-btn{display:inline-block;padding:6px 16px;border-radius:6px;background:var(--blue);color:#fff;text-decoration:none;font-size:12px;font-weight:500;margin-top:8px}
@media(max-width:640px){
  .container{padding:16px 12px}
  .nav{gap:6px}.nav a{padding:6px 12px;font-size:11px}
  .header h1{font-size:18px}.header p{font-size:10px}
  .section{padding:14px 14px}
  .kpi-grid{grid-template-columns:1fr 1fr;gap:8px}
  .kpi{padding:10px 10px}.kpi-label{font-size:9px}.kpi-val{font-size:14px}.kpi-sub{font-size:9px}
  table{font-size:10px}th{padding:6px 8px;font-size:9px}td{padding:5px 8px;font-size:10px}
  .detail-row{grid-template-columns:100px 1fr 1fr;font-size:10px}
  .detail-row .lbl{font-size:10px}.detail-row .val{font-size:10px}
}
</style>
</head>
<body>
<div class="container">
<div class="nav">
  <a href="/">손익 계산기</a>
  <a href="/cashflow.html">입출금 내역</a>
  <a href="/daily.html" class="active">일별 손익</a>
  <a href="/analysis.html">실적 분석</a>
</div>
<div class="header">
  <h1>일별 손익 현황</h1>
  <p>손익 계산기에서 입력한 데이터 기반 · 자동 반영</p>
</div>

<div class="kpi-grid" id="kpiArea"></div>

<!-- 선택 날짜 상세 -->
<div class="detail-panel" id="detailPanel">
  <div class="section-title" id="detailTitle">날짜 상세</div>
  <div id="detailBody"></div>
</div>

<!-- Charts -->
<div id="chartSection" style="display:none">
<div class="section">
  <div class="section-title" style="color:#06b6d4">일별 수익 추이</div>
  <canvas id="dailyChart" height="180"></canvas>
</div>
<div class="section">
  <div class="section-title" style="color:#f59e0b">월별 수익</div>
  <canvas id="monthlyChart" height="180"></canvas>
</div>
<div class="section">
  <div class="section-title" style="color:#10b981">누적 수익 추이</div>
  <canvas id="cumChart" height="180"></canvas>
</div>
</div>

<!-- History -->
<div class="section">
  <div class="section-title">일별 손익 이력</div>
  <div class="h-wrap" id="histArea"></div>
</div>
</div>

<script>
var ACCTS=[
  {id:"134",label:"***134 대형주"},
  {id:"142",label:"***142 ETF+개별"},
  {id:"161",label:"***161 IRP"},
  {id:"614",label:"***614 중소형주"},
  {id:"637",label:"***637 종합"}
];
var REMAINING_BASE=2450528613;
var STORE_KEY="inv_daily_v2";
var CF_KEY="inv_cf_v2";

function getStore(){try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};}}
function getCfStore(){try{return JSON.parse(localStorage.getItem(CF_KEY))||{};}catch(e){return {};}}
function getAllDates(){return Object.keys(getStore()).sort();}
function getRemaining(){
  var cfs=getCfStore();var adj=0;
  for(var d in cfs){var list=cfs[d];for(var i=0;i<list.length;i++){var c=list[i];if(c.t==="in")adj+=c.v;else if(c.t==="out")adj+=c.v;}}
  return REMAINING_BASE+adj;
}
function fmt(n){if(!n&&n!==0)return"-";if(n===0)return"0";return Math.abs(Math.round(n)).toLocaleString("ko-KR")}
function fs(n){if(!n&&n!==0)return"-";if(n===0)return"0";return(n>0?"+":"-")+fmt(n)}

function getPrevDay(dateStr){
  var dates=getAllDates();var prev=null;
  for(var i=0;i<dates.length;i++){if(dates[i]<dateStr)prev=dates[i];else break;}
  return prev?getStore()[prev]:null;
}
function getDayCf(dateStr){
  var list=(getCfStore()[dateStr])||[];var t=0;
  for(var i=0;i<list.length;i++)t+=list[i].v;return t;
}

function calcTotalPnl(rec){
  var sh=0;for(var i=0;i<ACCTS.length;i++)sh+=(rec[ACCTS[i].id]||0);
  var hkD=rec.hk_dom||0,hkO=rec.hk_ovs||0,kk=rec.kkumbi||0;
  var bal=sh+hkD+hkO;
  return{totalBal:bal,totalPnl:bal-getRemaining()-kk,kkumbi:kk,shinhan:sh,hkDom:hkD,hkOvs:hkO};
}

function calcPnl(dt,rec){
  var cur=calcTotalPnl(rec);var prev=getPrevDay(dt);var cf=getDayCf(dt);
  var dp=prev?(cur.totalPnl-calcTotalPnl(prev).totalPnl-cf):(cur.totalPnl-cf);
  return{curTotal:cur.totalBal,totalPnl:cur.totalPnl,pnl:dp,cf:cf,detail:cur};
}

function calcCumPnl(){
  var store=getStore();var dates=getAllDates();var res=[];
  for(var i=0;i<dates.length;i++){
    var dt=dates[i];var p=calcPnl(dt,store[dt]);
    res.push({d:dt,pnl:p.pnl,cum:p.totalPnl,bal:p.curTotal,cf:p.cf,detail:p.detail});
  }
  return res;
}

/* KPI */
function renderKpi(){
  var cum=calcCumPnl();
  if(cum.length===0){document.getElementById("kpiArea").innerHTML="";return;}
  var last=cum[cum.length-1];
  var pc=getRemaining()>0?(last.cum/getRemaining()*100):0;
  var h="";
  h+="<div class='kpi'><div class='kpi-label'>최근 일간 손익</div><div class='kpi-val "+(last.pnl>=0?"green":"red")+"'>"+fs(last.pnl)+"</div><div class='kpi-sub'>"+last.d.slice(5)+"</div></div>";
  h+="<div class='kpi'><div class='kpi-label'>누적 손익 (꿈비제외)</div><div class='kpi-val "+(last.cum>=0?"green":"red")+"'>"+fs(last.cum)+"</div><div class='kpi-sub'>"+(pc>=0?"+":"")+pc.toFixed(2)+"%</div></div>";
  h+="<div class='kpi'><div class='kpi-label'>현재 총 자산</div><div class='kpi-val'>"+fmt(last.bal)+"</div></div>";
  h+="<div class='kpi'><div class='kpi-label'>잔류원금</div><div class='kpi-val'>"+fmt(getRemaining())+"</div></div>";
  document.getElementById("kpiArea").innerHTML=h;
}

/* Detail panel */
function showDetail(dt){
  var store=getStore();var rec=store[dt];
  if(!rec){document.getElementById("detailPanel").classList.remove("open");return;}
  document.getElementById("detailPanel").classList.add("open");
  var p=calcPnl(dt,rec);
  var d=p.detail;
  document.getElementById("detailTitle").innerHTML=dt+" 계좌별 상세 <span style='font-size:11px;color:var(--muted);font-weight:400;margin-left:8px'>전체손익 "+fs(p.totalPnl)+"</span>";
  var h="";
  for(var i=0;i<ACCTS.length;i++){
    var a=ACCTS[i];var v=rec[a.id]||0;
    h+="<div class='detail-row'><div class='lbl'>"+a.label+"</div><div class='val'>"+fmt(v)+"</div><div></div></div>";
  }
  h+="<div class='detail-row'><div class='lbl amber'>꿈비 손익</div><div class='val' style='color:"+(d.kkumbi>=0?"#10b981":"#ef4444")+"'>"+fs(d.kkumbi)+"</div><div style='font-size:10px;color:var(--muted);text-align:right'>전체손익에서 차감</div></div>";
  h+="<div class='detail-row'><div class='lbl purple'>한투 국내</div><div class='val'>"+fmt(d.hkDom)+"</div><div class='val' style='color:"+(d.hkDom-300000000>=0?"#10b981":"#ef4444")+"'>"+fs(d.hkDom-300000000)+"</div></div>";
  h+="<div class='detail-row'><div class='lbl purple'>한투 해외</div><div class='val'>"+fmt(d.hkOvs)+"</div><div class='val' style='color:"+(d.hkOvs-300000000>=0?"#10b981":"#ef4444")+"'>"+fs(d.hkOvs-300000000)+"</div></div>";
  h+="<div class='detail-row' style='border-top:2px solid var(--blue);padding-top:10px;margin-top:4px'><div style='font-weight:600'>합계</div><div class='val' style='font-weight:600'>"+fmt(d.totalBal)+"</div><div class='val' style='font-weight:600;color:"+(p.totalPnl>=0?"#10b981":"#ef4444")+"'>"+fs(p.totalPnl)+"</div></div>";
  // 당일 입출금
  var cfs=(getCfStore()[dt])||[];
  if(cfs.length>0){
    h+="<div style='margin-top:12px;padding-top:10px;border-top:1px solid var(--border)'><div style='font-size:11px;color:var(--muted);margin-bottom:6px'>당일 입출금 ("+cfs.length+"건)</div>";
    for(var i=0;i<cfs.length;i++){
      var c=cfs[i];var vc=c.v>=0?"#10b981":"#ef4444";
      h+="<div style='display:flex;justify-content:space-between;padding:3px 0;font-size:11px'><span style='color:#94a3b8'>***"+c.a+" "+c.m+"</span><span style='font-family:JetBrains Mono,monospace;color:"+vc+"'>"+fs(c.v)+"</span></div>";
    }
    h+="</div>";
  }
  h+="<a href='/' class='link-btn' style='margin-top:12px'>손익 계산기에서 수정</a>";
  document.getElementById("detailBody").innerHTML=h;
}

/* History */
function renderHist(){
  var cum=calcCumPnl();
  if(cum.length===0){
    document.getElementById("histArea").innerHTML="<div class='empty-msg'>저장된 데이터가 없습니다.<br><a href='/' class='link-btn'>손익 계산기에서 잔액 입력</a></div>";
    return;
  }
  var h="<table><thead><tr><th>날짜</th><th class='r'>총 잔액</th><th class='r'>입출금</th><th class='r'>일간 손익</th><th class='r'>누적 손익</th></tr></thead><tbody>";
  for(var i=cum.length-1;i>=0;i--){
    var r=cum[i];
    var pc=r.pnl>=0?"color:#10b981":"color:#ef4444";
    var cc=r.cum>=0?"color:#10b981":"color:#ef4444";
    h+="<tr class='clickable' onclick=\"showDetail('"+r.d+"')\">";
    h+="<td>"+r.d+"</td>";
    h+="<td class='r'>"+fmt(r.bal)+"</td>";
    h+="<td class='r' style='color:var(--muted)'>"+(r.cf?fs(r.cf):"-")+"</td>";
    h+="<td class='r' style='"+pc+";font-weight:500'>"+fs(r.pnl)+"</td>";
    h+="<td class='r' style='"+cc+";font-weight:600'>"+fs(r.cum)+"</td>";
    h+="</tr>";
  }
  h+="</tbody></table>";
  document.getElementById("histArea").innerHTML=h;
}

/* Charts */
var dC=null,mC=null,cC=null;
function renderCharts(){
  var cum=calcCumPnl();
  if(cum.length<2){document.getElementById("chartSection").style.display="none";return;}
  document.getElementById("chartSection").style.display="block";
  var lb=[],dp=[],cp=[];
  for(var i=0;i<cum.length;i++){lb.push(cum[i].d.slice(5));dp.push(Math.round(cum[i].pnl/10000));cp.push(Math.round(cum[i].cum/10000));}
  var mm={};for(var i=0;i<cum.length;i++){var m=cum[i].d.slice(0,7);mm[m]=(mm[m]||0)+cum[i].pnl;}
  var mk=Object.keys(mm).sort(),ml=[],mp=[];
  for(var i=0;i<mk.length;i++){ml.push(mk[i].slice(2));mp.push(Math.round(mm[mk[i]]/10000));}
  var o={responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return c.raw.toLocaleString()+"만원"}}}},scales:{x:{ticks:{color:"#64748b",font:{size:10}},grid:{color:"rgba(30,41,59,.3)"}},y:{ticks:{color:"#64748b",font:{size:10},callback:function(v){return v.toLocaleString()}},grid:{color:"rgba(30,41,59,.3)"}}}};
  if(dC)dC.destroy();dC=new Chart(document.getElementById("dailyChart"),{type:"bar",data:{labels:lb,datasets:[{data:dp,backgroundColor:dp.map(function(v){return v>=0?"rgba(16,185,129,.6)":"rgba(239,68,68,.6)"}),borderRadius:3}]},options:o});
  if(mC)mC.destroy();mC=new Chart(document.getElementById("monthlyChart"),{type:"bar",data:{labels:ml,datasets:[{data:mp,backgroundColor:mp.map(function(v){return v>=0?"rgba(245,158,11,.6)":"rgba(239,68,68,.6)"}),borderRadius:4}]},options:o});
  if(cC)cC.destroy();cC=new Chart(document.getElementById("cumChart"),{type:"line",data:{labels:lb,datasets:[{data:cp,borderColor:"#10b981",backgroundColor:"rgba(16,185,129,.1)",fill:true,tension:.3,pointRadius:3,pointBackgroundColor:"#10b981"}]},options:o});
}

renderKpi();renderHist();renderCharts();
</script>
</body>
</html>
